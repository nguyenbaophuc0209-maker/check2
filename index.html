<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bí mật nè...</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4);
  overflow: hidden;
}

/* Màn hỏi */
#question {
  text-align: center;
  color: white;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#yes { background: #00ffcc; }
#no { background: #ff4d4d; }

/* Màn loading */
#loading {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  color: black;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Màn troll */
#prank {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Animation chữ */
#message {
  font-size: 35px;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from {transform: scale(1);}
  to {transform: scale(1.1);}
}

/* Rung */
@keyframes shake {
  0% {transform: translate(0);}
  25% {transform: translate(5px, -5px);}
  50% {transform: translate(-5px, 5px);}
  75% {transform: translate(5px, 5px);}
  100% {transform: translate(0);}
}
</style>
</head>

<body>

<!-- Màn hỏi -->
<div id="question">
  <h1>Mọi người có muốn biết bí mật của Hà khônggg? 😏</h1>
  <button onclick="yesClick()">Có</button>
  <button onclick="noClick()">Không</button>
  <p id="noText"></p>
</div>

<!-- Màn loading -->
<div id="loading">
  <h2 id="loadingText">Đang tải trang...</h2>
</div>

<!-- Màn troll -->
<div id="prank">
  <h1 id="message"></h1>
</div>

<script>

// NO
function noClick() {
  document.getElementById("noText").innerHTML = "Không nghe thì thôi 😒";
}

// YES
function yesClick() {
  document.getElementById("question").style.display = "none";

  const loading = document.getElementById("loading");
  loading.style.display = "flex";

  const loadingText = document.getElementById("loadingText");

  let percent = 0;
  let isError = false;

  // Loop loading
  const interval = setInterval(() => {

    if (!isError) {
      if (percent < 99) {
        percent += Math.floor(Math.random() * 5) + 1;
        if (percent > 99) percent = 99;
      }

      loadingText.innerHTML = "Đang tải trang... " + percent + "%";

      // Tới 95% là lỗi
      if (percent >= 95) {
        isError = true;
        loadingText.innerHTML = "❌ Lỗi kết nối... Đang thử lại...";
        
        // Delay trước khi reset (cho giống thật)
        setTimeout(() => {
          percent = 0;
          isError = false;
        }, 1200);
      }

    }

  }, Math.random() * 200 + 100);

  // Sau 2 phút thì kết thúc troll
  setTimeout(() => {
    clearInterval(interval);

    loading.style.display = "none";

    const prank = document.getElementById("prank");
    prank.style.display = "flex";

    document.body.style.background = "black";
    document.body.style.animation = "shake 0.3s 5";

    typeText("Ú òa 🤡 bị lừa rồi nha!\nChúc mọi người 1/4 vui vẻee");
  }, 120000);
}


// Gõ chữ
function typeText(text) {
  let i = 0;
  const msg = document.getElementById("message");

  function typing() {
    if (i < text.length) {
      msg.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
      i++;
      setTimeout(typing, 40);
    }
  }

  typing();
}

</script>

</body>
</html>
